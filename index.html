<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perceptron L vs T</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="sparkle-container"></div>
  <h1>Perceptron: L vs T</h1>
  <div id="grid" class="grid"></div>

  <div class="buttons">
    <button id="clearBtn">Clear</button>
    <button id="saveLBtn">Save as L</button>
    <button id="saveTBtn">Save as T</button>
    <button id="trainBtn">Train</button>
    <button id="predictBtn">Predict</button>
  </div>

  <p id="sampleCount">Samples: 0</p>
  <p id="status">Status: Waiting...</p>
  <p id="prediction">Prediction: None</p>

  <script src="script.js"></script>
</body>
</html>
